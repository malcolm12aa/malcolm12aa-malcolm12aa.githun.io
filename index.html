<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anime RPG — Fan Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #060911;
            background-image:
                radial-gradient(ellipse at 15% 60%, rgba(127,90,240,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(0,180,216,0.05) 0%, transparent 55%);
            color: #c0d0e0;
            font-family: 'Rajdhani', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 28px 10px;
        }

        #game {
            width: 760px;
            background: linear-gradient(180deg, #0d1117 0%, #080c14 100%);
            border: 1px solid #1c3354;
            box-shadow:
                0 0 0 1px #0a1628,
                0 0 50px rgba(0,100,200,0.08),
                0 20px 80px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* ── Header ── */
        #game-header {
            background: linear-gradient(135deg, #090e1c 0%, #12082a 50%, #090e1c 100%);
            border-bottom: 1px solid #1c3354;
            padding: 20px 24px 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        #game-header::before {
            content: '';
            position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(
                90deg, transparent, transparent 48px,
                rgba(255,255,255,0.012) 48px, rgba(255,255,255,0.012) 49px
            );
        }
        #game-header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, #e8c84a44, transparent);
        }
        #game-header h2 {
            font-family: 'Cinzel Decorative', serif;
            color: #e8c84a;
            font-size: 17px;
            letter-spacing: 5px;
            text-shadow: 0 0 24px rgba(232,200,74,0.55), 0 0 50px rgba(232,200,74,0.2);
            margin: 0 0 5px;
            position: relative;
        }
        #game-header .subtitle {
            font-size: 9px;
            color: #2e5070;
            letter-spacing: 7px;
            text-transform: uppercase;
            font-family: 'Rajdhani', monospace;
            font-weight: 600;
            position: relative;
        }

        /* ── Stat Bar ── */
        #stats-bar {
            display: grid; grid-template-columns: repeat(6, 1fr);
            font-size: 11px;
            background: #060911;
            border-bottom: 1px solid #111d2e;
        }
        .stat-cell {
            text-align: center;
            padding: 9px 4px;
            border-right: 1px solid #111d2e;
        }
        .stat-cell:last-child { border-right: none; }
        .stat-cell .lbl {
            display: block; color: #2e5070; font-size: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            font-weight: 700; margin-bottom: 2px;
        }
        .stat-cell .val { color: #e8c84a; font-weight: 700; font-size: 14px; }

        /* ── Game Body ── */
        #game-body { padding: 16px 20px 22px; }

        /* ── Battle Panel ── */
        #battle-panel {
            display: none; margin-bottom: 14px;
            border: 1px solid #1c3354;
            overflow: hidden;
        }
        .bp-row {
            display: flex; align-items: center;
            padding: 13px 18px;
            border-bottom: 1px solid #0e1a2a;
        }
        .bp-row.enemy-row { background: linear-gradient(90deg, #180808 0%, #0d0d16 100%); }
        .bp-row.player-row { background: linear-gradient(90deg, #06101a 0%, #0d0d16 100%); }
        .bp-emoji {
            font-size: 44px; line-height: 1; min-width: 56px; text-align: center;
            filter: drop-shadow(0 0 10px rgba(255,71,87,0.35));
        }
        .bp-info { flex: 1; margin-left: 18px; }
        .bp-name {
            font-size: 14px; font-weight: 700; margin-bottom: 7px;
            font-family: 'Rajdhani', monospace; letter-spacing: 1px;
        }
        .enemy-col { color: #ff4757; text-shadow: 0 0 14px rgba(255,71,87,0.45); }
        .player-col { color: #00b4d8; text-shadow: 0 0 14px rgba(0,180,216,0.45); }
        .bar-label {
            font-size: 8px; color: #2e5070; margin-bottom: 3px;
            letter-spacing: 1.5px; font-weight: 700; text-transform: uppercase;
        }
        .bar-track {
            background: #07090f; height: 11px;
            border: 1px solid #1c3354; margin-bottom: 6px;
            overflow: hidden;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
        .bar-hp-e { background: linear-gradient(90deg, #7a0000, #ff4757); box-shadow: 0 0 8px rgba(255,71,87,0.5); }
        .bar-hp-p { background: linear-gradient(90deg, #005020, #2ecc71); box-shadow: 0 0 8px rgba(46,204,113,0.4); }
        .bar-mp-p { background: linear-gradient(90deg, #1a0050, #7f5af0); box-shadow: 0 0 8px rgba(127,90,240,0.45); }
        .bar-text  { font-size: 10px; color: #2e5070; margin-bottom: 6px; font-weight: 600; }

        /* ── Output ── */
        #output {
            min-height: 220px; max-height: 300px; overflow-y: auto;
            border: 1px solid #111d2e;
            padding: 13px 18px; margin-bottom: 12px;
            background: #050810;
            font-size: 13px; line-height: 1.9;
        }
        #output::-webkit-scrollbar { width: 3px; }
        #output::-webkit-scrollbar-track { background: #050810; }
        #output::-webkit-scrollbar-thumb { background: #1c3354; border-radius: 2px; }
        #output p { margin: 0; }

        .narrator  { color: #5a7a98; }
        .highlight { color: #e8c84a; font-weight: 700; }
        .danger    { color: #ff4757; font-weight: 700; letter-spacing: 0.5px; }
        .success   { color: #2ecc71; font-weight: 600; }
        .info      { color: #00b4d8; }
        .b-player  { color: #48cae4; }
        .b-enemy   { color: #ff6b81; }
        .b-system  { color: #e8c84a; font-weight: 600; }

        /* ── Choices ── */
        #choices { display: flex; flex-direction: column; gap: 5px; }
        .btn-row { display: flex; gap: 5px; }
        button {
            flex: 1;
            background: #0a0f1c;
            color: #8aaac8;
            border: 1px solid #1c3354;
            padding: 10px 15px;
            font-family: 'Rajdhani', monospace;
            font-size: 13px; font-weight: 600;
            cursor: pointer; text-align: left;
            transition: all 0.14s ease;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }
        button::before { content: '▸  '; color: #1c3354; transition: color 0.14s; }
        button:hover:not(:disabled) {
            background: #0e1628;
            color: #ffffff;
            border-color: #e8c84a;
            box-shadow: 0 0 16px rgba(232,200,74,0.08), inset 0 0 16px rgba(232,200,74,0.025);
            transform: translateX(2px);
        }
        button:hover:not(:disabled)::before { color: #e8c84a; }
        button:disabled { opacity: 0.28; cursor: default; }

        button.battle-btn {
            text-align: center;
            background: #07091a;
            border-color: #1c3354;
            font-size: 13px; letter-spacing: 0.5px;
        }
        button.battle-btn::before { content: ''; }
        button.battle-btn:hover:not(:disabled) {
            background: #0c1030;
            border-color: #7f5af0;
            box-shadow: 0 0 20px rgba(127,90,240,0.15);
            transform: none;
        }

        /* ── Name Input ── */
        #name-form { display: flex; gap: 8px; align-items: center; }
        input[type="text"] {
            background: #070b14; color: #e8c84a;
            border: 1px solid #1c3354;
            padding: 10px 13px;
            font-family: 'Rajdhani', monospace;
            font-size: 14px; font-weight: 700;
            width: 65%; outline: none;
        }
        input[type="text"]:focus {
            border-color: #e8c84a;
            box-shadow: 0 0 10px rgba(232,200,74,0.1);
        }

        /* ── Shop ── */
        .shop-section {
            color: #e8c84a; font-size: 10px;
            letter-spacing: 2px; margin: 6px 0 3px;
            font-weight: 700; text-transform: uppercase;
        }

        /* ── Status Badges ── */
        .sfx-row { min-height: 18px; margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
        .sfx {
            padding: 1px 7px; font-size: 10px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.07); white-space: nowrap;
            font-family: 'Rajdhani', monospace; letter-spacing: 0.3px;
        }
        .sfx-burn      { background:#2d0a00; color:#ff6b35; border-color:#ff6b3540; }
        .sfx-poison    { background:#160020; color:#c77dff; border-color:#c77dff40; }
        .sfx-bleed     { background:#200000; color:#ff4757; border-color:#ff475740; }
        .sfx-stun      { background:#1e1a00; color:#ffd166; border-color:#ffd16640; }
        .sfx-sleep     { background:#000c20; color:#74b9ff; border-color:#74b9ff40; }
        .sfx-freeze    { background:#000c18; color:#a8dadc; border-color:#a8dadc40; }
        .sfx-paralysis { background:#1e0e00; color:#fca311; border-color:#fca31140; }
        .sfx-fear      { background:#0c0c0c; color:#8d99ae; border-color:#8d99ae40; }
        .sfx-doom      { background:#140000; color:#ef233c; border-color:#ef233c40; }
        .sfx-petrify   { background:#0e0e0e; color:#dee2e6; border-color:#dee2e640; }
        .sfx-weaken    { background:#1e0010; color:#f72585; border-color:#f7258540; }
        .sfx-bravery   { background:#001408; color:#06d6a0; border-color:#06d6a040; }
        .sfx-haste     { background:#001418; color:#48cae4; border-color:#48cae440; }
        .sfx-confusion { background:#100020; color:#b5179e; border-color:#b5179e40; }

        /* ── Character Screen ── */
        .cs-summary {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 10px 14px; background: #060c18;
            border: 1px solid #1c3354; margin-bottom: 6px;
        }
        .cs-char-name { color: #e8c84a; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
        .cs-class-tag { color: #8ab4cc; font-size: 11px; margin-top: 2px; }
        .cs-soul-block { text-align: right; }
        .cs-soul-lv { color: #a78bfa; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
        .cs-soul-sub { color: #9ab8d0; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
        .cs-exp-row {
            padding: 7px 14px; background: #060c18;
            border: 1px solid #1c3354; border-top: none; margin-bottom: 8px;
        }
        .cs-exp-label { font-size: 10px; color: #8aaac8; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
        .cs-exp-track { background: #07090f; height: 8px; border: 1px solid #1c3354; overflow: hidden; }
        .cs-exp-fill  { background: linear-gradient(90deg, #5a2a8a, #a78bfa); height: 100%; transition: width 0.4s; }
        .cs-exp-text  { font-size: 10px; color: #8aaac8; margin-top: 3px; }

        .stat-row {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px; background: #07090f;
            border: 1px solid #111d2e; margin-bottom: 4px;
            transition: border-color 0.14s;
        }
        .stat-row:hover { border-color: #1c3354; }
        .sr-icon { font-size: 15px; min-width: 20px; text-align: center; }
        .sr-name {
            color: #e8c84a; font-weight: 700; font-size: 11px;
            letter-spacing: 1px; min-width: 110px; text-transform: uppercase;
        }
        .sr-level { color: #7f5af0; font-size: 12px; font-weight: 700; min-width: 38px; }
        .sr-val { color: #8aaac8; font-size: 11px; flex: 1; }
        .sr-val strong { color: #48cae4; font-size: 12px; }
        .sr-next { color: #8aaac8; font-size: 10px; min-width: 80px; letter-spacing: 0.3px; }
        .sr-cost { font-size: 11px; font-weight: 700; min-width: 60px; text-align: right; }
        .can-afford  { color: #2ecc71; }
        .cant-afford { color: #e74c3c; }

        .btn-levelup {
            flex: none; width: 88px;
            background: #0c1030; border: 1px solid #3a2080;
            color: #a78bfa; font-size: 11px; font-weight: 700;
            padding: 6px 8px; cursor: pointer; text-align: center;
            font-family: 'Rajdhani', monospace; letter-spacing: 0.5px;
            transition: all 0.14s;
        }
        .btn-levelup::before { content: '' !important; }
        .btn-levelup:hover:not(:disabled) {
            background: #18104a; border-color: #a78bfa;
            color: #fff; box-shadow: 0 0 14px rgba(127,90,240,0.3);
            transform: none !important;
        }
        .btn-levelup:disabled { opacity: 0.22; cursor: default; }

        /* ── Low HP pulse ── */
        @keyframes hp-pulse {
            0%, 100% { filter: brightness(0.85); }
            50%       { filter: brightness(1.4); }
        }
        .bar-hp-p.low-hp {
            animation: hp-pulse 1s ease-in-out infinite;
            background: linear-gradient(90deg, #6a0000, #ff4757);
        }

        /* ── Divider ── */
        .zone-divider { border: none; border-top: 1px solid #111d2e; margin: 10px 0; }

        /* ── Settings Button ── */
        #settings-btn {
            position: absolute; top: 50%; right: 18px;
            transform: translateY(-50%);
            background: rgba(10,15,28,0.8); color: #e8c84a;
            border: 1px solid #2e4070; font-size: 17px;
            cursor: pointer; padding: 5px 10px; border-radius: 4px;
            z-index: 50; line-height: 1; transition: background 0.2s;
        }
        #settings-btn:hover { background: #1c3354; }

        /* ── Settings Panel ── */
        #settings-panel {
            display: none; position: fixed; top: 0; right: 0; bottom: 0;
            width: 310px; background: #080c14;
            border-left: 1px solid #1c3354;
            z-index: 9999; overflow-y: auto; padding: 18px 18px 30px;
            box-shadow: -8px 0 40px rgba(0,0,0,0.85);
            font-family: 'Rajdhani', monospace;
        }
        #settings-panel.open { display: block; }
        .sp-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1c3354;
        }
        .sp-title {
            font-family: 'Cinzel Decorative', serif; color: #e8c84a;
            font-size: 13px; letter-spacing: 3px;
        }
        .sp-close {
            color: #ff4757; background: none; border: none;
            font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px;
        }
        .sp-section { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #111d2e; }
        .sp-section h3 {
            color: #00b4d8; font-size: 10px; letter-spacing: 2.5px;
            text-transform: uppercase; font-weight: 700; margin-bottom: 10px;
        }
        .sp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .sp-label { color: #5a7a98; font-size: 12px; min-width: 90px; }
        .sp-slider { flex: 1; accent-color: #e8c84a; cursor: pointer; }
        .sp-val { color: #e8c84a; font-size: 12px; min-width: 38px; text-align: right; }
        .sp-select {
            flex: 1; background: #0a0f1c; color: #8aaac8;
            border: 1px solid #1c3354; padding: 5px 7px;
            font-family: 'Rajdhani', monospace; font-size: 13px;
        }
        .sp-btn {
            background: #0a0f1c; color: #8aaac8; border: 1px solid #1c3354;
            padding: 6px 10px; font-family: 'Rajdhani', monospace;
            font-size: 12px; cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .sp-btn:hover, .sp-btn.active { background: #1c3354; color: #e8c84a; border-color: #e8c84a; }
        .music-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 8px; }
        .lvl-ctrl { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
        .lvl-ctrl label { color: #5a7a98; font-size: 11px; flex: 1; }
        .lvl-ctrl .lv-num { color: #e8c84a; font-size: 13px; min-width: 28px; text-align: center; font-weight: 700; }
        .lvl-ctrl button {
            background: #0a0f1c; color: #8aaac8; border: 1px solid #1c3354;
            width: 26px; height: 26px; cursor: pointer; font-size: 15px; line-height: 1;
        }
        .lvl-ctrl button:hover { color: #e8c84a; background: #1c3354; }
        .save-msg { font-size: 11px; margin-top: 6px; min-height: 14px; }
    </style>
</head>
<body>
<div id="game">
    <div id="game-header">
        <h2>⚔ ANIME RPG ⚔</h2>
        <div class="subtitle">異世界 &nbsp;·&nbsp; Fan Game &nbsp;·&nbsp; 闘え</div>
        <button id="settings-btn" onclick="toggleSettings()" title="Settings">⚙</button>
    </div>

    <!-- Settings Panel (fixed overlay) -->
    <div id="settings-panel">
        <div class="sp-header">
            <span class="sp-title">SETTINGS</span>
            <button class="sp-close" onclick="toggleSettings()">✕</button>
        </div>

        <div class="sp-section">
            <h3>Display</h3>
            <div class="sp-row">
                <span class="sp-label">Text Size</span>
                <input type="range" class="sp-slider" id="sz-slider" min="11" max="20" value="13"
                       oninput="applyTextSize(this.value)">
                <span class="sp-val" id="sz-val">13px</span>
            </div>
            <div class="sp-row">
                <span class="sp-label">Font</span>
                <select class="sp-select" onchange="applyFont(this.value)">
                    <option value="'Rajdhani',monospace">Rajdhani (Default)</option>
                    <option value="'Courier New',monospace">Courier New</option>
                    <option value="Georgia,serif">Georgia</option>
                    <option value="Arial,sans-serif">Arial</option>
                    <option value="Verdana,sans-serif">Verdana</option>
                    <option value="'Times New Roman',serif">Times New Roman</option>
                </select>
            </div>
            <div class="sp-row">
                <span class="sp-label">Box Height</span>
                <input type="range" class="sp-slider" id="oh-slider" min="160" max="520" value="300" step="20"
                       oninput="applyOutputHeight(this.value)">
                <span class="sp-val" id="oh-val">300px</span>
            </div>
        </div>

        <div class="sp-section">
            <h3>Music</h3>
            <div class="music-grid">
                <button class="sp-btn" data-track="naruto"      onclick="MusicSystem.play('naruto')">🍃 Naruto</button>
                <button class="sp-btn" data-track="bleach"      onclick="MusicSystem.play('bleach')">⚔ Bleach</button>
                <button class="sp-btn" data-track="onepiece"    onclick="MusicSystem.play('onepiece')">🏴‍☠️ One Piece</button>
                <button class="sp-btn" data-track="demonslayer" onclick="MusicSystem.play('demonslayer')">🌸 Demon Slayer</button>
                <button class="sp-btn" data-track="jjk"         onclick="MusicSystem.play('jjk')">👁 JJK</button>
                <button class="sp-btn" data-track="mha"         onclick="MusicSystem.play('mha')">💥 MHA</button>
                <button class="sp-btn" data-track="dbz"         onclick="MusicSystem.play('dbz')">🔥 DBZ</button>
                <button class="sp-btn" data-track="hxh"         onclick="MusicSystem.play('hxh')">🎭 HxH</button>
                <button class="sp-btn" data-track="battle"      onclick="MusicSystem.play('battle')">⚡ Battle</button>
                <button class="sp-btn" data-track="town"        onclick="MusicSystem.play('town')">🏰 Town</button>
            </div>
            <div class="sp-row">
                <span class="sp-label">Volume</span>
                <input type="range" class="sp-slider" id="vol-slider" min="0" max="100" value="20"
                       oninput="MusicSystem.setVolume(+this.value); document.getElementById('vol-val').textContent=this.value">
                <span class="sp-val" id="vol-val">20</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
                <button class="sp-btn" onclick="MusicSystem.stop()">⏹ Stop</button>
                <span id="now-playing" style="color:#5a7a98;font-size:11px;flex:1;text-align:right">No music</span>
            </div>
        </div>

        <div class="sp-section">
            <h3>Battle Speed</h3>
            <div class="sp-row">
                <span class="sp-label">Turn Delay</span>
                <input type="range" class="sp-slider" id="spd-slider" min="100" max="1400" value="750" step="50"
                       oninput="applyBattleSpeed(+this.value)">
                <span class="sp-val" id="spd-val">0.75s</span>
            </div>
        </div>

        <div class="sp-section">
            <h3>Testing — Level Control</h3>
            <div id="lvl-ctrl-area" style="margin-bottom:8px"></div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
                <button class="sp-btn" onclick="devGold(100)">+100g</button>
                <button class="sp-btn" onclick="devGold(1000)">+1000g</button>
                <button class="sp-btn" onclick="devGold(10000)">+10k g</button>
                <button class="sp-btn" onclick="devGold(-100)">−100g</button>
                <button class="sp-btn" onclick="devFillHP()">Fill HP/MP</button>
                <button class="sp-btn" onclick="devGiveExp(500)">+500 EXP</button>
            </div>
        </div>

        <div class="sp-section">
            <h3>Save / Load</h3>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
                <button class="sp-btn" onclick="saveGame()">💾 Save</button>
                <button class="sp-btn" onclick="loadGame()">📂 Load</button>
                <button class="sp-btn" style="color:#ff4757" onclick="confirmNewGame()">🗑 New Game</button>
            </div>
            <div id="save-msg" class="save-msg"></div>
        </div>
    </div>

    <div id="stats-bar">
        <div class="stat-cell"><span class="lbl">NAME</span><span class="val" id="s-name">—</span></div>
        <div class="stat-cell"><span class="lbl">JOB</span><span class="val" id="s-class">—</span></div>

    total_lv: 0,        // race_lv + sum(jobs[].lv)  ·  max 100
    level: 0,           // alias for total_lv — keeps zone gating working
    level_pts: 0,       // unspent level points (earned from EXP)
    stat_pts: 0,        // free stat points — 10 per level-up, spend anywhere
    bonus: { hp:0, mp:0, pa:0, pd:0, ag:0, ma:0, md:0, rs:0, sp:0 },

    exp: 0, next_exp: 100,

    // ── 9 Overlord stats (computed by applyStats) ───────────
    hp: 80, max_hp: 80,
    mp: 40, max_mp: 40,
    phy_atk: 5, phy_def: 5,
    agi: 5,
    mag_atk: 5, mag_def: 5,
    resist: 5, special: 5,
    // ── Battle system compat aliases ─────────────────────────
    atk: 5, int_stat: 5,
    weapon: null,
    spells: [],
    inventory: [],
};

// Active battle state — null when not fighting
let B = null;
// Persists the zone return function across endBattle (which nulls B)
let _lastZone = null;

// Recompute all 9 stats from current racial + job level investments
function applyStats() {
    const race = RACE_DATA[G.race_id];
    let hp=0, mp=0, pa=0, pd=0, ag=0, ma=0, md=0, rs=0, sp=0;
    if (race) {
        const b=race.base, p=race.per_lv, lv=G.race_lv;
        hp+=b.hp+p.hp*lv; mp+=b.mp+p.mp*lv; pa+=b.pa+p.pa*lv;
        pd+=b.pd+p.pd*lv; ag+=b.ag+p.ag*lv; ma+=b.ma+p.ma*lv;
        md+=b.md+p.md*lv; rs+=b.rs+p.rs*lv; sp+=b.sp+p.sp*lv;
    }
    G.jobs.forEach(job => {
        const jd=JOB_DATA[job.id];
        if (!jd || job.lv<=0) return;
        const b=jd.base, p=jd.per_lv, lv=job.lv;
        hp+=b.hp+p.hp*lv; mp+=b.mp+p.mp*lv; pa+=b.pa+p.pa*lv;
        pd+=b.pd+p.pd*lv; ag+=b.ag+p.ag*lv; ma+=b.ma+p.ma*lv;
        md+=b.md+p.md*lv; rs+=b.rs+p.rs*lv; sp+=b.sp+p.sp*lv;
    });
    hp+=G.bonus.hp; mp+=G.bonus.mp; pa+=G.bonus.pa;
    pd+=G.bonus.pd; ag+=G.bonus.ag; ma+=G.bonus.ma;
    md+=G.bonus.md; rs+=G.bonus.rs; sp+=G.bonus.sp;
    // passive skill bonuses
    G.learned_skills.forEach(sk => {
        if (sk.type !== 'p' || !sk.bon) return;
        const b = sk.bon;
        if (b.hp) hp+=b.hp; if (b.mp) mp+=b.mp; if (b.pa) pa+=b.pa;
        if (b.pd) pd+=b.pd; if (b.ag) ag+=b.ag; if (b.ma) ma+=b.ma;
        if (b.md) md+=b.md; if (b.rs) rs+=b.rs; if (b.sp) sp+=b.sp;
    });
    G.max_hp=Math.floor(hp); G.max_mp=Math.floor(mp);
    G.phy_atk=Math.floor(pa); G.phy_def=Math.floor(pd);
    G.agi=Math.floor(ag);
    G.mag_atk=Math.floor(ma); G.mag_def=Math.floor(md);
    G.resist=Math.floor(rs); G.special=Math.floor(sp);
    G.atk=G.phy_atk; G.int_stat=G.mag_atk;
    G.hp=Math.min(G.hp, G.max_hp);
    G.mp=Math.min(G.mp, G.max_mp);
    G.total_lv = G.race_lv + G.jobs.reduce((s,j)=>s+j.lv, 0);
    G.level = G.total_lv;
}

function updateStats() {
    document.getElementById('s-name').textContent  = G.name  || '—';
    document.getElementById('s-class').textContent = G.jobs.length ? JOB_DATA[G.jobs[0].id].name : '—';
    const pts = (G.level_pts > 0 ? ' [Lv+' + G.level_pts + ']' : '') + (G.stat_pts > 0 ? ' [Sp+' + G.stat_pts + ']' : '');
    document.getElementById('s-level').textContent = G.total_lv + pts;
    document.getElementById('s-hp').textContent    = G.hp + '/' + G.max_hp;
    document.getElementById('s-mp').textContent    = G.mp + '/' + G.max_mp;
    document.getElementById('s-gold').textContent  = G.gold;
}

function updateBattlePanel() {
    if (!B) return;
    // Rebuild enemy area
    const area = document.getElementById('b-enemy-area');
    area.innerHTML = '';
    B.enemies.forEach((en, i) => {
        const hp  = B.enemy_hps[i];
        const pct = Math.max(0, (hp / en.hp) * 100);
        const dead = hp <= 0;
        const isCurrent = (i === B.enemy_idx);
        const row = document.createElement('div');
        row.className = 'bp-row enemy-row';
        row.style.opacity = dead ? '0.35' : '1';
        row.innerHTML =
            '<div class="bp-emoji"' + (i === 0 ? ' id="b-e-emoji"' : '') + '>' + en.emoji + '</div>' +
            '<div class="bp-info">' +
              '<div class="bp-name enemy-col"' + (i === 0 ? ' id="b-e-name"' : '') + '>' +
                (B.enemies.length > 1 ? (isCurrent ? '▶ ' : '  ') : '') + en.name + (dead ? '  [DEFEATED]' : '') +
              '</div>' +
              '<div class="bar-label">HP</div>' +
              '<div class="bar-track"><div class="bar-fill bar-hp-e"' + (i === 0 ? ' id="b-e-bar"' : '') +
                ' style="width:' + pct + '%"></div></div>' +
              '<div class="bar-text"' + (i === 0 ? ' id="b-e-hp"' : '') + '>' + hp + ' / ' + en.hp + '</div>' +
              '<div class="sfx-row"' + (i === 0 ? ' id="b-e-sfx"' : '') + '></div>' +
            '</div>';
        area.appendChild(row);
        if (i === 0) renderBadges(B.e_fxs[0], 'b-e-sfx');
    });

    const pHPct = Math.max(0, (G.hp / G.max_hp) * 100);
    const pMPct = Math.max(0, (G.mp / G.max_mp) * 100);
    document.getElementById('b-p-name').textContent     = G.name + '  (Lv.' + G.level + ')';
    document.getElementById('b-p-hp-bar').style.width   = pHPct + '%';
    document.getElementById('b-p-hp').textContent       = G.hp + ' / ' + G.max_hp;
    document.getElementById('b-p-mp-bar').style.width   = pMPct + '%';
    document.getElementById('b-p-mp').textContent       = G.mp + ' / ' + G.max_mp;
    const hpBar = document.getElementById('b-p-hp-bar');
    hpBar.style.background = pHPct > 50 ? '#27ae60' : pHPct > 25 ? '#e67e22' : '#c0392b';
    renderBadges(B.p_fx, 'b-p-sfx');
}

// ── Level Control ─────────────────────────────────────────────
function refreshLvlCtrl() {
    const area = document.getElementById('lvl-ctrl-area');
    if (!area) return;
    area.innerHTML = '';
    const race = RACE_DATA[G.race_id];
    if (race) {
        area.appendChild(makeLvlRow(
            'Race Lv  (max ' + (race.max_lv || 25) + ')',
            G.race_lv,
            () => { if (G.race_lv < (race.max_lv||25)) { G.race_lv++; G.total_lv++; G.level++; applyStats(); updateStats(); refreshLvlCtrl(); } },
            () => { if (G.race_lv > 0) { G.race_lv--; G.total_lv--; G.level--; applyStats(); updateStats(); refreshLvlCtrl(); } }
        ));
    }
    G.jobs.forEach(job => {
        const jd = JOB_DATA[job.id];
        if (!jd) return;
        area.appendChild(makeLvlRow(
            jd.name + ' Lv  (max ' + (jd.max_lv||50) + ')',
            job.lv,
            () => { if (job.lv < (jd.max_lv||50)) { job.lv++; G.total_lv++; G.level++; applyStats(); updateStats(); refreshLvlCtrl(); } },
            () => { if (job.lv > 0) { job.lv--; G.total_lv--; G.level--; applyStats(); updateStats(); refreshLvlCtrl(); } }
        ));
    });
    if (!race && G.jobs.length === 0)
        area.innerHTML = '<p style="color:#5a7a98;font-size:11px">Start a game first.</p>';
}

function makeLvlRow(label, cur, onPlus, onMinus) {
    const d = document.createElement('div');
    d.className = 'lvl-ctrl';
    const lbl = document.createElement('label'); lbl.textContent = label;
    const m = document.createElement('button'); m.textContent = '−'; m.onclick = onMinus;
    const v = document.createElement('span');   v.className = 'lv-num'; v.textContent = cur;
    const p = document.createElement('button'); p.textContent = '+'; p.onclick = onPlus;
    d.append(lbl, m, v, p);
    return d;
}

function devGold(n)    { G.gold = Math.max(0, G.gold + n); updateStats(); }
function devFillHP()   { G.hp = G.max_hp; G.mp = G.max_mp; updateStats(); }
function devGiveExp(n) {
    G.exp += n;
    while (G.exp >= G.next_exp) {
        G.exp -= G.next_exp; G.level_pts++; G.stat_pts += 10;
        G.next_exp = 30 + 10 * G.total_lv;
    }
    updateStats();
}

// ── Save / Load ───────────────────────────────────────────────
function saveGame() {
    try {
        localStorage.setItem('animeRPG_v1', JSON.stringify(G));
        showSaveMsg('✓ Saved at ' + new Date().toLocaleTimeString(), '#2ecc71');
    } catch(e) { showSaveMsg('Save failed: ' + e.message, '#ff4757'); }
}
function loadGame() {
    const raw = localStorage.getItem('animeRPG_v1');
    if (!raw) { showSaveMsg('No save file found.', '#ff4757'); return; }
    try {
        const saved = JSON.parse(raw);
        Object.keys(saved).forEach(k => { G[k] = saved[k]; });
        applyStats(); updateStats();
        showSaveMsg('✓ Loaded successfully!', '#2ecc71');
    } catch(e) { showSaveMsg('Load failed: ' + e.message, '#ff4757'); }
}
function confirmNewGame() {
    if (!confirm('Start a new game? All unsaved progress will be lost.')) return;
    localStorage.removeItem('animeRPG_v1');
    location.reload();
}
function showSaveMsg(txt, color) {
    const el = document.getElementById('save-msg');
    if (!el) return;
    el.textContent = txt; el.style.color = color;
    setTimeout(() => { if (el) el.textContent = ''; }, 3500);
}

const MusicSystem = {
    ctx: null, masterGain: null,
    playing: false, trackId: null,
    volume: 0.05, noteIdx: 0, nextNoteTime: 0, timerId: null,

    _init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = this.volume;
        this.masterGain.connect(this.ctx.destination);
    },

    play(id) {
        this._init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.stop();
        this.trackId = id; this.noteIdx = 0; this.playing = true;
        this.nextNoteTime = this.ctx.currentTime + 0.05;
        this._tick();
        document.querySelectorAll('[data-track]').forEach(b =>
            b.classList.toggle('active', b.dataset.track === id));
        const np = document.getElementById('now-playing');
        if (np) np.textContent = '♪  ' + (MUSIC_TRACKS[id]?.name || id);
    },

    stop() {
        this.playing = false;
        if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
        document.querySelectorAll('[data-track]').forEach(b => b.classList.remove('active'));
        const np = document.getElementById('now-playing');
        if (np) np.textContent = 'No music';
    },

    setVolume(pct) {
        this.volume = pct / 100 * 0.25;   // map 0-100 → 0-0.25 master gain
        if (this.masterGain)
            this.masterGain.gain.setTargetAtTime(this.volume, this.ctx.currentTime, 0.02);
    },

    _tick() {
        if (!this.playing) return;
        const track = MUSIC_TRACKS[this.trackId];
        if (!track) return;
        const lookahead = 0.35;
        while (this.nextNoteTime < this.ctx.currentTime + lookahead) {
            const [freq, beats] = track.notes[this.noteIdx];
            const dur = beats * (60 / track.bpm);
            if (freq > 0) this._note(freq, dur, track.wave || 'sine');
            this.nextNoteTime += dur;
            this.noteIdx = (this.noteIdx + 1) % track.notes.length;
        }
        this.timerId = setTimeout(() => this._tick(), 100);
    },

    _note(freq, dur, wave) {
        const osc  = this.ctx.createOscillator();
        const env  = this.ctx.createGain();
        osc.connect(env); env.connect(this.masterGain);
        osc.type = wave; osc.frequency.value = freq;
        const t = this.nextNoteTime;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(0.6, t + 0.015);
        env.gain.setValueAtTime(0.6, t + dur * 0.68);
        env.gain.linearRampToValueAtTime(0, t + dur * 0.94);
        osc.start(t); osc.stop(t + dur);
    },
};

// STATUS EFFECT DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const STATUS = {
    // DoT — deals % of max HP per turn
    burn:      { icon: '🔥', label: 'Burn',      dotPct: 0.10, turns: 3, neg: true  },
    poison:    { icon: '☠',  label: 'Poison',    dotPct: 0.08, turns: 4, neg: true  },
    bleed:     { icon: '🩸', label: 'Bleed',     dotPct: 0.12, turns: 3, neg: true  },
    // Incapacitation — skip target's turn
    stun:      { icon: '⚡', label: 'Stun',      skip: true,    turns: 1, neg: true  },
    sleep:     { icon: '💤', label: 'Sleep',     skip: true,    turns: 3, neg: true, wakeOnHit: true },
    freeze:    { icon: '❄',  label: 'Freeze',    skip: true,    turns: 2, neg: true, vulnMult: 1.5   },
    paralysis: { icon: '⚡', label: 'Paralysis', skipChance: 0.5, turns: 3, neg: true },
    fear:      { icon: '😱', label: 'Fear',      skip: true,    turns: 2, neg: true  },
    petrify:   { icon: '🪨', label: 'Petrify',  skip: true,    turns: 3, neg: true, vulnMult: 2.0   },
    // Behavioral
    confusion: { icon: '🌀', label: 'Confusion', confuse: true, turns: 2, neg: true  },
    // Stat mods — buff or debuff ATK multiplier
    weaken:    { icon: '⬇',  label: 'Weaken',    atkMult: 0.5,  turns: 3, neg: true  },
    bravery:   { icon: '⚔',  label: 'Bravery',   atkMult: 1.5,  turns: 3, neg: false },
    haste:     { icon: '💨', label: 'Haste',     atkMult: 1.3,  turns: 2, neg: false },
    // Fatal
    doom:      { icon: '💀', label: 'Doom',      fatal: true,   turns: 3, neg: true  },
};

// ── Status helpers ────────────────────────────────────────────
// Render status badges into a sfx-row element
function renderBadges(fx, elId) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.innerHTML = Object.entries(fx)
        .filter(([, t]) => t > 0)
        .map(([id, t]) => {
            const s = STATUS[id];
            return '<span class="sfx sfx-' + id + '">' + s.icon + ' ' + s.label + ' ' + t + '</span>';
        }).join('');
}

// Apply a status to player ('p') or enemy ('e')
function applyFx(target, id) {
    if (!STATUS[id]) return;
    const fx   = target === 'p' ? B.p_fx : B.e_fx;
    const name = target === 'p' ? G.name : B.enemy.name;
    const st   = STATUS[id];
    // Don't overwrite if more turns remain
    fx[id] = Math.max(fx[id] || 0, st.turns);
    print(st.icon + ' ' + name + ' is afflicted with ' + st.label + '! (' + st.turns + ' turns)',
          target === 'p' ? 'danger' : 'b-system');
    updateBattlePanel();
}

// Apply a buff status to player ('p') or enemy ('e')
function applyBuff(target, id) {
    if (!STATUS[id]) return;
    const fx   = target === 'p' ? B.p_fx : B.e_fx;
    const name = target === 'p' ? G.name : B.enemy.name;
    const st   = STATUS[id];
    fx[id] = st.turns;
    print(st.icon + ' ' + name + ' gains ' + st.label + '! (' + st.turns + ' turns)', 'success');
    updateBattlePanel();
}

// Wake a sleeping/frozen target when hit — returns true if woken
function wakeOnHit(target) {
    const fx   = target === 'p' ? B.p_fx : B.e_fx;
    const name = target === 'p' ? G.name : B.enemy.name;
    let woke = false;
    if (fx.sleep)  { delete fx.sleep;  print(name + ' woke up!',          'info'); woke = true; }
    if (fx.freeze) { delete fx.freeze; print(name + ' thawed out!',       'info'); woke = true; }
    if (woke) updateBattlePanel();
    return woke;
}

// Vulnerability multiplier (freeze / petrify)
function vulnMult(target) {
    const fx = target === 'p' ? B.p_fx : B.e_fx;
    if (fx.petrify) return STATUS.petrify.vulnMult;
    if (fx.freeze)  return STATUS.freeze.vulnMult;
    return 1;
}

// ATK multiplier for the acting party (bravery/haste buff, weaken debuff)
function atkMult(target) {
    const fx = target === 'p' ? B.p_fx : B.e_fx;
    let m = 1;
    if (fx.bravery) m *= STATUS.bravery.atkMult;
    if (fx.haste)   m *= STATUS.haste.atkMult;
    if (fx.weaken)  m *= STATUS.weaken.atkMult;
    return m;
}

// Process one turn-start for target: tick DoT/doom, then check skip.
// Returns 'dead' | 'skip' | 'act'
function processTurnStart(target) {
    const fx    = target === 'p' ? B.p_fx : B.e_fx;
    const name  = target === 'p' ? G.name  : B.enemy.name;
    const maxHp = target === 'p' ? G.max_hp : B.enemy.hp;
    let died = false;

    // ── DoT (burn / poison / bleed) ──────────────────────────────
    for (const id of ['burn', 'poison', 'bleed']) {
        if (!fx[id]) continue;
        const dmg = Math.max(1, Math.floor(maxHp * STATUS[id].dotPct));
        if (target === 'p') { G.hp        = Math.max(0, G.hp        - dmg); if (G.hp        === 0) died = true; }
        else                { B.enemy_hp  = Math.max(0, B.enemy_hp  - dmg); if (B.enemy_hp  === 0) died = true; }
        print(STATUS[id].icon + ' ' + name + ' takes ' + dmg + ' ' + STATUS[id].label + ' damage!',
              target === 'p' ? 'danger' : 'success');
        if (--fx[id] <= 0) delete fx[id];
    }

    // ── Doom countdown ────────────────────────────────────────────
    if (fx.doom) {
        if (fx.doom === 1) {
            print('💀 DOOM! ' + name + ' is obliterated!', 'danger');
            if (target === 'p') G.hp = 0; else B.enemy_hp = 0;
            died = true;
        } else {
            print('💀 Doom: ' + (fx.doom - 1) + ' turn(s) remaining...', 'danger');
        }
        if (--fx.doom <= 0) delete fx.doom;
    }

    updateStats();
    updateBattlePanel();
    if (died) return 'dead';

    // ── Skip statuses (hard skip) ─────────────────────────────────
    for (const id of ['stun', 'sleep', 'freeze', 'fear', 'petrify']) {
        if (!fx[id]) continue;
        print(STATUS[id].icon + ' ' + name + ' is ' + STATUS[id].label + 'ed — cannot act!', 'danger');
        if (--fx[id] <= 0) delete fx[id];
        updateBattlePanel();
        return 'skip';
    }

    // ── Paralysis (50% skip chance) ───────────────────────────────
    if (fx.paralysis) {
        if (--fx.paralysis <= 0) delete fx.paralysis;
        if (Math.random() < 0.5) {
            print('⚡ ' + name + ' is paralyzed — cannot move!', 'danger');
            updateBattlePanel();
            return 'skip';
        }
    }

    // ── Confusion (50% chance — self-attack) ─────────────────────
    if (fx.confusion) {
        if (--fx.confusion <= 0) delete fx.confusion;
        if (Math.random() < 0.5) {
            const selfDmg = Math.floor((target === 'p' ? G.atk : B.enemy.atk) * 0.6);
            if (target === 'p') { G.hp        = Math.max(0, G.hp        - selfDmg); if (G.hp        === 0) died = true; }
            else                { B.enemy_hp  = Math.max(0, B.enemy_hp  - selfDmg); if (B.enemy_hp  === 0) died = true; }
            print('🌀 ' + name + ' is confused and attacks itself for ' + selfDmg + '!', 'danger');
            updateStats();
            updateBattlePanel();
            return died ? 'dead' : 'skip';
        }
    }

    // ── Stat mods tick when their holder acts ────────────────────
    for (const id of ['bravery', 'haste', 'weaken']) {
        if (!fx[id]) continue;
        if (--fx[id] <= 0) { delete fx[id]; print(STATUS[id].icon + ' ' + STATUS[id].label + ' wore off.', 'narrator'); }
    }
    updateBattlePanel();
    return 'act';
}

// Show target-selection menu; if only 1 living enemy, fires callback immediately
function selectTarget(onSelect) {
    const living = B.enemies.reduce((a, _, i) => { if (B.enemy_hps[i] > 0) a.push(i); return a; }, []);
    if (living.length <= 1) { onSelect(living[0] ?? 0); return; }
    $ch.innerHTML = '';
    const lbl = document.createElement('p');
    lbl.className = 'b-system'; lbl.textContent = '— Choose Target —';
    $ch.appendChild(lbl);
    living.forEach(i => {
        const en = B.enemies[i];
        const b = document.createElement('button');
        b.textContent = en.emoji + '  ' + en.name + '  (' + B.enemy_hps[i] + ' / ' + en.hp + ' HP)';
        b.onclick = () => onSelect(i);
        $ch.appendChild(b);
    });
    const back = document.createElement('button');
    back.textContent = '← Back';
    back.onclick = showBattleMenu;
    $ch.appendChild(back);
}

function startBattle(enemyOrArr) {
    const arr = Array.isArray(enemyOrArr) ? enemyOrArr : [enemyOrArr];
    const enemies  = arr.map(e => ({ ...e }));
    const hps      = enemies.map(e => e.hp);
    const fxs      = enemies.map(() => ({}));
    B = {
        enemies,
        enemy_hps: hps,
        e_fxs:     fxs,
        enemy_idx: 0,
        p_fx: {},
        get enemy()    { return this.enemies[this.enemy_idx]; },
        get enemy_hp() { return this.enemy_hps[this.enemy_idx]; },
        set enemy_hp(v){ this.enemy_hps[this.enemy_idx] = v; },
        get e_fx()     { return this.e_fxs[this.enemy_idx]; },
    };
    showBattlePanel(true);
    clearOutput();
    if (enemies.length === 1) {
        print('— ENCOUNTER —', 'b-system');
        print(enemies[0].emoji + '  ' + enemies[0].name + ' appeared!', 'danger');
        print(enemies[0].lore, 'narrator');
    } else {
        print('— GROUP ENCOUNTER  (' + enemies.length + ' enemies!) —', 'b-system');
        enemies.forEach(e => print(e.emoji + '  ' + e.name, 'danger'));
        print(enemies[0].lore, 'narrator');
    }
    print('');
    updateBattlePanel();
    showBattleMenu();
}

// ── Player actions ────────────────────────────────────────────
function doAttack() {
    selectTarget(idx => {
        B.enemy_idx = idx;
        disableAll();
        const base    = G.atk + (G.weapon ? G.weapon.atk : 0);
        const isCrit  = Math.random() < G.agi * 0.004;
        const dmg     = Math.floor(base * (0.85 + Math.random() * 0.3) * atkMult('p') * vulnMult('e') * (isCrit ? 1.5 : 1));
        B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
        wakeOnHit('e');
        const targetTag = B.enemies.length > 1 ? ' [vs ' + B.enemy.name + ']' : '';
        const atkLabel = (G.weapon ? ' with ' + G.weapon.name : '') + targetTag + (isCrit ? ' — ★ CRITICAL HIT!' : '');
        print(G.name + ' attacks' + atkLabel + '  [' + dmg + ' damage]', isCrit ? 'highlight' : 'b-player');
        updateBattlePanel();
        if (G.weapon && G.weapon.statusId && Math.random() < (G.weapon.statusChance || 0.25))
            applyFx('e', G.weapon.statusId);
        if (checkWin()) return;
        enemyTurn();
    });
}

function doSkillMenu() {
    $ch.innerHTML = '';
    const activeSkills = G.learned_skills.filter(s => s.type === 'a');
    if (G.spells.length === 0 && activeSkills.length === 0) {
        print('No skills or spells. Buy skills at the Skill Library, or level up for class skills.', 'danger');
        setTimeout(showBattleMenu, 800);
        return;
    }
    if (activeSkills.length > 0) {
        const lbl = document.createElement('p');
        lbl.className = 'b-system'; lbl.textContent = '— Class Skills —';
        $ch.appendChild(lbl);
        activeSkills.forEach(sk => {
            const b = document.createElement('button');
            const tags = (sk.aoe ? '  ★ ALL ENEMIES' : '') +
                         (sk.st ? ' → ' + STATUS[sk.st].icon + STATUS[sk.st].label : '') +
                         (sk.buf ? '  self: ' + STATUS[sk.buf].icon + STATUS[sk.buf].label : '') +
                         (sk.hits > 1 ? '  x' + sk.hits : '') +
                         (sk.drain ? '  DRAIN' : '');
            b.textContent = sk.name + '  ' + (sk.mp || 0) + ' MP' + tags;
            b.disabled = G.mp < (sk.mp || 0);
            b.onclick = () => resolveSkill(sk);
            $ch.appendChild(b);
        });
    }
    if (G.spells.length > 0) {
        const lbl = document.createElement('p');
        lbl.className = 'b-system'; lbl.textContent = '— Purchased Spells —';
        $ch.appendChild(lbl);
        G.spells.forEach(sid => {
            const sp = SPELLS.find(s => s.id === sid);
            const tags = [sp.aoe && '★ ALL ENEMIES',
                          sp.status && ('→ ' + STATUS[sp.status].icon + STATUS[sp.status].label),
                          sp.selfBuff && ('self: ' + STATUS[sp.selfBuff].icon + STATUS[sp.selfBuff].label)]
                         .filter(Boolean).join('  ');
            const b = document.createElement('button');
            b.textContent = sp.name + ' [' + sp.anime + ']  ' + sp.mp + ' MP' + (tags ? '  ' + tags : '');
            b.disabled = G.mp < sp.mp;
            b.onclick = () => castSpell(sp);
            $ch.appendChild(b);
        });
    }
    const back = document.createElement('button');
    back.textContent = '← Back';
    back.onclick = showBattleMenu;
    $ch.appendChild(back);
}

function castSpell(sp) {
    const execute = () => {
        disableAll();
        G.mp = Math.max(0, G.mp - sp.mp);
        if (sp.aoe) {
            print(G.name + ' casts ' + sp.name + '! (' + sp.anime + ') — ★ ALL ENEMIES', 'b-player');
            B.enemies.forEach((en, i) => {
                if (B.enemy_hps[i] <= 0) return;
                B.enemy_idx = i;
                const dmg = Math.floor((sp.power + G.mag_atk * 0.7 + Math.random() * 12) * vulnMult('e'));
                B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
                wakeOnHit('e');
                print('  ' + en.name + ':  ' + dmg + ' dmg!' + (sp.status ? '  ' + STATUS[sp.status].icon : ''), 'b-player');
                if (sp.status) applyFx('e', sp.status);
            });
            const fl = B.enemy_hps.findIndex(hp => hp > 0);
            B.enemy_idx = fl >= 0 ? fl : 0;
        } else {
            const dmg = Math.floor((sp.power + G.mag_atk * 0.7 + Math.random() * 12) * vulnMult('e'));
            B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
            wakeOnHit('e');
            print(G.name + ' casts ' + sp.name + '! (' + sp.anime + ')', 'b-player');
            print('Deals ' + dmg + ' damage!', 'b-player');
            if (sp.status) applyFx('e', sp.status);
        }
        if (sp.selfBuff) applyBuff('p', sp.selfBuff);
        updateStats();
        updateBattlePanel();
        if (checkWin()) return;
        enemyTurn();
    };
    if (sp.aoe) execute();
    else selectTarget(idx => { B.enemy_idx = idx; execute(); });
}

function doItemMenu() {
    const usable = G.inventory.filter(e => e.qty > 0);
    if (usable.length === 0) {
        print('You have no items.', 'danger');
        setTimeout(showBattleMenu, 800);
        return;
    }
    $ch.innerHTML = '';
    usable.forEach(entry => {
        const item = POTIONS.find(i => i.id === entry.id);
        const b = document.createElement('button');
        b.textContent = item.name + ' x' + entry.qty + '  —  ' + item.desc;
        b.onclick = () => useItem(item, entry);
        $ch.appendChild(b);
    });
    const back = document.createElement('button');
    back.textContent = '← Back';
    back.onclick = showBattleMenu;
    $ch.appendChild(back);
}

function useItem(item, entry) {
    disableAll();
    entry.qty--;
    // Restoration
    if (item.full) { G.hp = G.max_hp; G.mp = G.max_mp; }
    else {
        if (item.hp) G.hp = Math.min(G.max_hp, G.hp + item.hp);
        if (item.mp) G.mp = Math.min(G.max_mp, G.mp + item.mp);
    }
    // Curatives
    if (item.cure)    { item.cure.forEach(id => delete B.p_fx[id]); print('Status cured!', 'success'); }
    if (item.cureAll) {
        Object.keys(B.p_fx).forEach(id => { if (STATUS[id] && STATUS[id].neg) delete B.p_fx[id]; });

    print(G.name + ' used ' + item.name + '!', 'success');
    updateStats();
    updateBattlePanel();
    enemyTurn();
}

// ── Turn engine ───────────────────────────────────────────────
// Called at the start of every player turn
async function playerTurnStart() {
    if (!B) return;
    const dots = document.createElement('p');
    dots.className = 'narrator'; dots.textContent = '...';
    $out.appendChild(dots); $out.scrollTop = $out.scrollHeight;
    await delay(400);
    dots.remove();

    const r = processTurnStart('p');
    if (r === 'dead') {
        print('You succumb to your wounds...', 'danger');
        await delay(900); gameOver(); return;
    }
    if (r === 'skip') { await delay(400); enemyTurn(); return; }
    showBattleMenu();
}

async function enemyTurn() {
    if (!B) return;
    const dots = document.createElement('p');
    dots.className = 'narrator'; dots.textContent = '...';
    $out.appendChild(dots); $out.scrollTop = $out.scrollHeight;
    await delay(ENEMY_TURN_DELAY);
    dots.remove();

    // Each living enemy attacks in sequence
    for (let i = 0; i < B.enemies.length; i++) {
        if (B.enemy_hps[i] <= 0) continue;   // already dead — skip
        const en = B.enemies[i];
        B.enemy_idx = i;

        // Process this enemy's turn start (DoT / skip checks)
        const r = processTurnStart('e');
        if (r === 'dead') { setTimeout(winBattle, 400); return; }
        if (r === 'skip') continue;

        const move   = en.moves[Math.floor(Math.random() * en.moves.length)];
        const rawDmg = Math.floor(en.atk * (0.85 + Math.random() * 0.3) * atkMult('e') * vulnMult('p'));
        const mit    = G.phy_def / (G.phy_def + 80);
        const dmg    = Math.max(1, Math.floor(rawDmg * (1 - mit)));
        G.hp = Math.max(0, G.hp - dmg);
        wakeOnHit('p');
        updateStats(); updateBattlePanel();
        print(en.name + ' uses ' + move.name + '!  [' + dmg + ' damage' + (mit > 0.05 ? ', -' + Math.floor(mit*100) + '% mitigated]' : ']'), 'b-enemy');
        const resistMit = G.resist * 0.003;
        if (move.status && Math.random() < (move.statusChance || 0.25) * (1 - resistMit))
            applyFx('p', move.status);
        if (G.hp <= 0) {
            await delay(600); print('You have fallen...', 'danger');
            await delay(900); gameOver(); return;
        }
        await delay(350);
    }
    // Restore enemy_idx to first living enemy for player's turn
    const living = B.enemy_hps.findIndex(hp => hp > 0);
    if (living !== -1) B.enemy_idx = living;
    updateBattlePanel();
    playerTurnStart();
}

function checkWin() {
    if (B.enemy_hp <= 0) {
        // Advance to next living enemy
        const nextIdx = B.enemy_hps.findIndex((hp, i) => i > B.enemy_idx && hp > 0);
        if (nextIdx !== -1) {
            print(B.enemy.name + ' was defeated! Next enemy: ' + B.enemies[nextIdx].name, 'success');
            B.enemy_idx = nextIdx;
            updateBattlePanel();
            return false;
        }
        // All enemies dead
        setTimeout(winBattle, 550);
        return true;
    }
    return false;
}

async function winBattle() {
    const totalExp  = B.enemies.reduce((s, e) => s + e.exp, 0);
    const totalGold = B.enemies.reduce((s, e) => s + e.gold, 0);
    if (B.enemies.length > 1) {
        print('All enemies defeated!', 'success');
    } else {
        print(B.enemies[0].name + ' was defeated!', 'success');
    }
    G.exp += totalExp; G.gold += totalGold;
    print('Gained ' + totalExp + ' EXP  and  ' + totalGold + ' gold!', 'b-system');
    updateStats();
    while (G.exp >= G.next_exp) {
        G.exp -= G.next_exp;
        G.level_pts++;
        G.stat_pts += 10;
        G.next_exp = 30 + 10 * G.total_lv;
        print('★  Level Up! +1 Level Point  +10 Stat Points — visit Character screen to spend them.  (Total Lv.' + G.total_lv + ')', 'b-system');
        updateStats();
    }
    const zone = _lastZone || town_center;
    endBattle();
    await delay(500);
    showChoices([
        ['Fight again', zone],
        ['Return to Town Center', town_center],
    ]);
}

function endBattle() { B = null; showBattlePanel(false); }

function gameOver() {
    endBattle(); clearOutput();
    print('Y O U   D I E D', 'danger');
    print('Your journey ends here, ' + G.name + '.', 'narrator');
    showChoices([['Start Over', () => location.reload()]]);
}

// SKILL SYSTEM
// ═══════════════════════════════════════════════════════════════
function checkSkillTier(src, data, newLv) {
    const tier = (data.skills || []).find(t => t[0] === newLv);
    if (!tier) return;
    if (tier[1].length === 1) {
        const sk = tier[1][0];
        if (!G.learned_skills.find(s => s.id === sk.id)) {
            G.learned_skills.push(sk);
            print('★ New skill unlocked: ' + sk.name + '!', 'b-system');
        }
    } else {
        G.pending_skill_picks.push({src, tier: newLv, opts: tier[1]});
    }
}

function resolveSkill(sk) {
    const msg = G.name + ' uses ' + sk.name + '!';

    // Heal — no target needed
    if (sk.heal) {
        disableAll();
        G.mp = Math.max(0, G.mp - (sk.mp || 0));
        const hp = Math.floor(G.max_hp * sk.heal);
        G.hp = Math.min(G.max_hp, G.hp + hp);
        print(msg + '  Recovered ' + hp + ' HP!', 'success');
        if (sk.buf) applyBuff('p', sk.buf);
        updateStats(); updateBattlePanel();
        if (!B || B.enemy_hp <= 0) { if (checkWin()) return; }
        enemyTurn();
        return;
    }

    // AoE damage skill — hits all living enemies
    if (sk.aoe) {
        disableAll();
        G.mp = Math.max(0, G.mp - (sk.mp || 0));
        print(msg + ' — ★ ALL ENEMIES', 'b-player');
        let totalDmg = 0;
        B.enemies.forEach((en, i) => {
            if (B.enemy_hps[i] <= 0) return;
            B.enemy_idx = i;
            const hits = sk.hits || 1;
            let dmgHere = 0;
            for (let h = 0; h < hits; h++) {
                const base = (sk.pow || 0) + G.phy_atk * 0.4 + G.mag_atk * 0.4;
                const dmg  = Math.floor((base / hits) * (0.85 + Math.random() * 0.3) * vulnMult('e') * atkMult('p'));
                B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
                dmgHere += dmg;
            }
            wakeOnHit('e');
            print('  ' + en.name + ':  ' + dmgHere + ' dmg!' + (sk.st ? '  ' + STATUS[sk.st].icon : ''), 'b-player');
            if (sk.drain) {
                const heal = Math.floor(dmgHere * 0.35);
                G.hp = Math.min(G.max_hp, G.hp + heal);
                print('  Drained ' + heal + ' HP!', 'success');
            }
            if (sk.st && Math.random() < (sk.sc || 0.3)) applyFx('e', sk.st);
            totalDmg += dmgHere;
        });
        const fl = B.enemy_hps.findIndex(hp => hp > 0);
        B.enemy_idx = fl >= 0 ? fl : 0;
        if (sk.buf) applyBuff('p', sk.buf);
        updateStats(); updateBattlePanel();
        if (checkWin()) return;
        enemyTurn();
        return;
    }

    // Single-target damage skill — pick target first
    selectTarget(idx => {
        B.enemy_idx = idx;
        disableAll();
        G.mp = Math.max(0, G.mp - (sk.mp || 0));
        const hits  = sk.hits || 1;
        let totalDmg = 0;
        for (let i = 0; i < hits; i++) {
            const base = (sk.pow || 0) + G.phy_atk * 0.4 + G.mag_atk * 0.4;
            const dmg  = Math.floor((base / hits) * (0.85 + Math.random() * 0.3) * vulnMult('e') * atkMult('p'));
            B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
            totalDmg  += dmg;
        }
        wakeOnHit('e');
        const targetTag = B.enemies.length > 1 ? ' [vs ' + B.enemy.name + ']' : '';
        print(msg + targetTag + (hits > 1 ? ' (' + hits + ' hits)' : '') + '  [' + totalDmg + ' damage]', 'b-player');
        if (sk.drain) {
            const heal = Math.floor(totalDmg * 0.35);
            G.hp = Math.min(G.max_hp, G.hp + heal);
            print('Drained ' + heal + ' HP!', 'success');
        }
        if (sk.st && Math.random() < (sk.sc || 0.3)) applyFx('e', sk.st);
        if (sk.buf) applyBuff('p', sk.buf);
        updateStats(); updateBattlePanel();
        if (checkWin()) return;
        enemyTurn();
    });
}

function character_screen() {
    clearOutput();
    showBattlePanel(false);
    const race = RACE_DATA[G.race_id];
    const expPct = Math.min(100, Math.floor((G.exp / G.next_exp) * 100));
    const jobLvTotal = G.jobs.reduce((s, j) => s + j.lv, 0);
    const racePct = Math.round((G.race_lv / 100) * 100);
    const jobPct  = Math.round((jobLvTotal  / 100) * 100);
    const pts = G.level_pts;

    // ── Header ──────────────────────────────────────────────────
    $ch.innerHTML = `
      <div class="cs-summary">
        <div>
          <div class="cs-char-name">${G.name}</div>
          <div class="cs-class-tag">${race.name} [${race.anime}]  ·  ${G.jobs.map(j=>JOB_DATA[j.id].name+' ['+JOB_DATA[j.id].anime+'] Lv.'+j.lv).join(' / ')}</div>
        </div>
        <div style="text-align:right">
          <div class="cs-soul-lv">Total Level ${G.total_lv} / 100</div>
          <div class="cs-soul-sub">${pts > 0 ? pts + ' Level Point'+(pts>1?'s':'')+' to spend!' : 'Race Lv.'+G.race_lv+' / '+race.max_lv}</div>
        </div>
      </div>
      <div class="cs-exp-row">
        <div class="cs-exp-label">Experience to next Level Point</div>
        <div class="cs-exp-track"><div class="cs-exp-fill" style="width:${expPct}%"></div></div>
        <div class="cs-exp-text">${G.exp} / ${G.next_exp} EXP &nbsp;·&nbsp; Gold: ${G.gold}</div>
      </div>`;

    // ── Level Breakdown bar (Racial vs Job) ─────────────────────
    const breakDiv = document.createElement('div');
    breakDiv.className = 'cs-exp-row';
    breakDiv.innerHTML =
        '<div class="cs-exp-label">Level Breakdown  —  Racial ' + G.race_lv + ' + Job ' + jobLvTotal + ' = ' + G.total_lv + ' / 100</div>' +
        '<div style="display:flex;height:10px;border:1px solid #1c3354;overflow:hidden;margin-top:3px">' +
        '  <div style="width:' + racePct + '%;background:linear-gradient(90deg,#7a0000,#ff4757)"></div>' +
        '  <div style="width:' + jobPct + '%;background:linear-gradient(90deg,#1a0050,#7f5af0)"></div>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;font-size:10px;color:#8aaac8;margin-top:3px">' +
        '  <span style="color:#ff4757">● Racial Levels: ' + G.race_lv + '</span>' +
        '  <span style="color:#7f5af0">Job Levels: ' + jobLvTotal + ' ●</span>' +
        '</div>';
    $ch.appendChild(breakDiv);

    // ── Pending skill picks ──────────────────────────────────────
    G.pending_skill_picks.forEach((pick, pickIdx) => {
        const pickDiv = document.createElement('div');
        pickDiv.className = 'cs-exp-row';
        pickDiv.innerHTML = '<div class="cs-exp-label" style="color:#2ecc71">⚔ CHOOSE A SKILL  (Lv.' + pick.tier + ' ' + (pick.src === 'race' ? RACE_DATA[G.race_id].name : JOB_DATA[pick.src].name) + ')</div>';
        pick.opts.forEach(sk => {
            const sb = document.createElement('button');
            sb.className = 'btn-levelup';
            sb.style.cssText = 'width:100%;margin-top:4px;text-align:left';
            const typeTag = sk.type === 'p' ? '[PASSIVE]' : '[' + (sk.mp||0) + ' MP]';
            const fxTag   = sk.type === 'a' ? (sk.st ? '  →' + sk.st : '') + (sk.hits > 1 ? '  x'+sk.hits+' hits' : '') + (sk.drain ? '  DRAIN' : '') + (sk.heal ? '  HEAL' : '') : '';
            sb.textContent = typeTag + '  ' + sk.name + fxTag + '  —  ' + sk.desc;
            sb.onclick = () => {
                G.learned_skills.push(sk);
                G.pending_skill_picks.splice(pickIdx, 1);
                applyStats(); updateStats(); character_screen();
            };
            pickDiv.appendChild(sb);
        });
        $ch.appendChild(pickDiv);
    });

    // ── Level Point spending ─────────────────────────────────────
    if (pts > 0) {
        const spendDiv = document.createElement('div');
        spendDiv.className = 'cs-exp-row';
        spendDiv.innerHTML = '<div class="cs-exp-label" style="color:#e8c84a">★ SPEND LEVEL POINT (' + pts + ' available)</div>';

        // Race option
        if (G.race_lv < race.max_lv) {
            const rb = document.createElement('button');
            rb.className = 'btn-levelup';
            rb.style.cssText = 'width:100%;margin-top:4px';
            rb.textContent = 'Race: ' + race.name + ' Lv.' + G.race_lv + ' → Lv.' + (G.race_lv + 1) + '  (max ' + race.max_lv + ')';
            rb.onclick = () => {
                G.race_lv++; G.level_pts--;
                checkSkillTier('race', race, G.race_lv);
                applyStats(); updateStats(); character_screen();
            };
            spendDiv.appendChild(rb);
        }
        // Each job option
        G.jobs.forEach((job, idx) => {
            const jd = JOB_DATA[job.id];
            if (job.lv >= jd.max_lv) return;
            const jb = document.createElement('button');
            jb.className = 'btn-levelup';
            jb.style.cssText = 'width:100%;margin-top:4px';
            jb.textContent = jd.name + ' Lv.' + job.lv + ' → Lv.' + (job.lv + 1) + '  (max ' + jd.max_lv + ')';
            jb.onclick = () => {
                G.jobs[idx].lv++; G.level_pts--;
                checkSkillTier(job.id, jd, G.jobs[idx].lv);
                applyStats(); updateStats(); character_screen();
            };
            spendDiv.appendChild(jb);
        });
        $ch.appendChild(spendDiv);
    }

    // ── Unlock advanced jobs ─────────────────────────────────────
    const advJobs = Object.entries(JOB_DATA).filter(([,j]) =>
        j.unlock_lv > 0 && G.total_lv >= j.unlock_lv &&
        !G.jobs.find(gj => gj.id === Number(Object.keys(JOB_DATA).find(k => JOB_DATA[k] === j)))
    );
    if (advJobs.length && G.jobs.length < 3) {
        const ulkDiv = document.createElement('div');
        ulkDiv.className = 'cs-exp-row';
        ulkDiv.innerHTML = '<div class="cs-exp-label" style="color:#a78bfa">⊕ UNLOCK ADVANCED JOB</div>';
        advJobs.forEach(([id, j]) => {
            const ub = document.createElement('button');
            ub.className = 'btn-levelup';
            ub.style.cssText = 'width:100%;margin-top:4px';
            ub.textContent = j.name + ' (unlocked at Lv.' + j.unlock_lv + ')  —  ' + j.desc;
            ub.onclick = () => { G.jobs.push({id: Number(id), lv: 0}); character_screen(); };
            ulkDiv.appendChild(ub);
        });
        $ch.appendChild(ulkDiv);
    }

    // ── Stat Point spending ──────────────────────────────────────
    if (G.stat_pts > 0) {
        const statSpendDiv = document.createElement('div');
        statSpendDiv.className = 'cs-exp-row';
        statSpendDiv.innerHTML = '<div class="cs-exp-label" style="color:#48cae4">⊕ SPEND STAT POINTS (' + G.stat_pts + ' available — +1 to any stat per point)</div>';
        const STAT_KEYS = [
            {key:'hp', label:'HP'},  {key:'mp', label:'MP'},
            {key:'pa', label:'PHY.ATK'}, {key:'pd', label:'PHY.DEF'},
            {key:'ag', label:'AGI'}, {key:'ma', label:'MAG.ATK'},
            {key:'md', label:'MAG.DEF'}, {key:'rs', label:'RESIST'},
            {key:'sp', label:'SPECIAL'},
        ];
        const spRow = document.createElement('div');
        spRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-top:6px';
        STAT_KEYS.forEach(({key, label}) => {
            const sb = document.createElement('button');
            sb.className = 'btn-levelup';
            sb.style.cssText = 'width:auto;padding:5px 10px;font-size:11px';
            sb.textContent = '+1 ' + label + ' (bonus: ' + G.bonus[key] + ')';
            sb.onclick = () => { G.bonus[key]++; G.stat_pts--; applyStats(); updateStats(); character_screen(); };
            spRow.appendChild(sb);
        });
        statSpendDiv.appendChild(spRow);
        $ch.appendChild(statSpendDiv);
    }

    // ── 9 Stat bars ─────────────────────────────────────────────
    const STAT_BARS = [
        { label: 'HP  [Hit Points]',      val: G.max_hp,  max: 600 },
        { label: 'MP  [Mana Points]',      val: G.max_mp,  max: 500 },
        { label: 'PHY.ATK',               val: G.phy_atk, max: 250 },
        { label: 'PHY.DEF',               val: G.phy_def, max: 200 },
        { label: 'AGILITY',               val: G.agi,     max: 200 },
        { label: 'MAG.ATK',               val: G.mag_atk, max: 250 },
        { label: 'MAG.DEF',               val: G.mag_def, max: 200 },
        { label: 'RESIST',                val: G.resist,  max: 150 },
        { label: 'SPECIAL',               val: G.special, max: 150 },
    ];
    const barsDiv = document.createElement('div');
    barsDiv.className = 'cs-exp-row';
    barsDiv.innerHTML = '<div class="cs-exp-label">STATUS  —  comparative scale</div>';
    STAT_BARS.forEach(sb => {
        const pct = Math.min(100, Math.round((sb.val / sb.max) * 100));
        barsDiv.innerHTML +=
            '<div style="display:flex;align-items:center;gap:8px;margin-top:5px">' +
            '  <span style="min-width:120px;font-size:10px;font-weight:700;color:#8aaac8;letter-spacing:0.5px">' + sb.label + '</span>' +
            '  <div style="flex:1;background:#07090f;height:10px;border:1px solid #1c3354;overflow:hidden">' +
            '    <div style="width:' + pct + '%;height:100%;background:linear-gradient(90deg,#3a1a6a,#a78bfa)"></div>' +
            '  </div>' +
            '  <span style="min-width:35px;text-align:right;font-size:11px;color:#48cae4;font-weight:700">' + sb.val + '</span>' +
            '</div>';
    });
    $ch.appendChild(barsDiv);

    const back = document.createElement('button');
    back.textContent = '← Return to Town Center';
    back.onclick = town_center;
    back.style.marginTop = '8px';
    $ch.appendChild(back);
}

function alchemy_shop_fn(shopIdx) {
    const shop = POTION_SHOPS[shopIdx];
    clearOutput();
    print(shop.anime.toUpperCase() + ' — ' + shop.name.toUpperCase(), 'highlight');
    print('Bubbling potions and remedies from ' + shop.anime + '.', 'narrator');
    print('Gold: ' + G.gold, 'info');
    print('');
    $ch.innerHTML = '';
    shop.ids.forEach(pid => {
        const item  = POTIONS.find(x => x.id === pid);
        if (!item) return;
        const entry = G.inventory.find(i => i.id === item.id);
        const qty   = entry ? entry.qty : 0;
        const b = document.createElement('button');
        b.textContent = item.name + '  —  ' + item.cost + 'g   ' + item.desc + '   (owned: ' + qty + ')';
        b.disabled = G.gold < item.cost;
        b.onclick = () => {
            G.gold -= item.cost;
            const inv = G.inventory.find(i => i.id === item.id);
            if (inv) inv.qty++;
            else G.inventory.push({ id: item.id, qty: 1 });
            updateStats();
            clearOutput();
            print('You bought ' + item.name + '!', 'success');
            showChoices([
                ['← Back to ' + shop.name, () => alchemy_shop_fn(shopIdx)],
                ['← All Alchemy Shops', alchemy_selector],
                ['← Shops', shops],
            ]);
        };
        $ch.appendChild(b);
    });
    const back = document.createElement('button');
    back.textContent = '← Back to All Alchemy Shops';
    back.onclick = alchemy_selector;
    $ch.appendChild(back);
}

// ── Generic zone helpers ──────────────────────────────────────
function zone_encounter(pool, returnFn) {
    _lastZone = returnFn;
    const tier   = Math.floor(G.total_lv / 25);
    const scaled = pool.filter((_, i) => i <= tier);
    const active = scaled.length ? scaled : [pool[0]];
    const rand   = () => ({ ...active[Math.floor(Math.random() * active.length)] });
    // 60% single, 30% double, 10% triple
    const roll = Math.random();
    let group;
    if (roll < 0.60)      group = [rand()];
    else if (roll < 0.90) group = [rand(), rand()];
    else                  group = [rand(), rand(), rand()];
    startBattle(group);
}

function afterFlee() {
    const fn = _lastZone || town_center;
    clearOutput();
    print('You retreat, heart pounding.', 'narrator');
    showChoices([
        ['Try again',             fn],
        ['Return to Town Center', town_center],
    ]);
}

    print('');
    print('Total Level: ' + G.total_lv + ' / 100', 'info');
    showChoices([
        ['Enter (random encounter)', () => zone_encounter(enemies, selfFn)],
        ['← World Map', show_map],
    ]);
}
